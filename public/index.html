<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lulú — Tu Guía de Cali</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #1a0a2e; color: white; height: 100vh; display: flex; flex-direction: column; }
    header { background: #FF6B35; padding: 16px 20px; display: flex; align-items: center; gap: 12px; }
    header h1 { font-size: 18px; }
    header p  { font-size: 12px; opacity: .8; }
    .perfil-bar { background: #2d1b4e; padding: 10px 20px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .perfil-btn { padding: 5px 14px; border-radius: 20px; border: 1px solid rgba(255,255,255,.3); background: transparent; color: white; cursor: pointer; font-size: 12px; transition: all .2s; }
    .perfil-btn.active { background: #FF6B35; border-color: #FF6B35; }
    .chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .msg { max-width: 82%; padding: 12px 16px; border-radius: 16px; line-height: 1.6; font-size: 14px; }
    .msg.user    { background: #FF6B35; align-self: flex-end; border-radius: 16px 16px 4px 16px; }
    .msg.bot     { background: #2d1b4e; align-self: flex-start; border-radius: 16px 16px 16px 4px; }
    .msg.loading { opacity: .6; font-style: italic; }
    .msg-footer  { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
    .replay-btn  { padding: 3px 10px; border-radius: 10px; border: none; background: rgba(255,107,53,.25); color: #FF6B35; cursor: pointer; font-size: 11px; }
    .replay-btn:hover { background: rgba(255,107,53,.4); }
    .speaking-dot { width: 8px; height: 8px; border-radius: 50%; background: #FF6B35; animation: pulse 1s infinite; display: none; }
    .speaking-dot.active { display: inline-block; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.8)} }
    .input-bar { padding: 12px 20px; background: #2d1b4e; display: flex; gap: 8px; }
    input { flex: 1; padding: 10px 16px; border-radius: 24px; border: none; background: rgba(255,255,255,.1); color: white; font-size: 14px; outline: none; }
    input::placeholder { color: rgba(255,255,255,.4); }
    #send { padding: 10px 20px; background: #FF6B35; border: none; border-radius: 24px; color: white; cursor: pointer; font-weight: 600; font-size: 14px; }
    #send:disabled { opacity: .5; cursor: not-allowed; }
  </style>
</head>
<body>

<header>
  <div style="font-size:32px">🌺</div>
  <div>
    <h1>Lulú — Tu guía de Cali</h1>
    <p>¡Bienvenido, parcero! ¿Qué querés conocer hoy?</p>
  </div>
</header>

<div class="perfil-bar">
  <span style="font-size:12px;opacity:.7">Soy turista:</span>
  <button class="perfil-btn active" onclick="setPerfil(this,'Cultural/Salsa')">💃 Salsero/a</button>
  <button class="perfil-btn" onclick="setPerfil(this,'Gastronomía')">🍽️ Foodie</button>
  <button class="perfil-btn" onclick="setPerfil(this,'Naturaleza')">🦜 Naturaleza</button>
  <button class="perfil-btn" onclick="setPerfil(this,'Turismo Médico')">🏥 Salud</button>
</div>

<div class="chat-box" id="chat">
  <div class="msg bot">
    <div>¡Oís, bienvenido a Cali! 🎶 Soy Lulú y conozco esta ciudad como la palma de mi mano. ¿Qué querés hacer hoy: comer, bailar, conocer historia o explorar la naturaleza?</div>
    <div class="msg-footer">
      <span class="speaking-dot" id="dot-welcome"></span>
      <button class="replay-btn" onclick="playVoice('¡Oís, bienvenido a Cali! Soy Lulú y conozco esta ciudad como la palma de mi mano.', this)">🔊 Escuchar</button>
    </div>
  </div>
</div>

<div class="input-bar">
  <input id="input" type="text" placeholder="Pregúntale a Lulú..."
         onkeydown="if(event.key==='Enter') sendMsg()"/>
  <button id="send" onclick="sendMsg()">Enviar</button>
</div>

<script>
  const sessionId = 'session_' + Date.now();
  let perfil = 'Cultural/Salsa';
  let currentAudio = null;

  function setPerfil(btn, p) {
    document.querySelectorAll('.perfil-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    perfil = p;
  }

  async function sendMsg() {
    const input = document.getElementById('input');
    const send  = document.getElementById('send');
    const msg   = input.value.trim();
    if (!msg) return;

    input.value = '';
    send.disabled = true;
    addMsg(msg, 'user');
    const loading = addMsg('Lulú está pensando...', 'bot loading');

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: msg, sessionId, perfil })
      });
      const data = await res.json();
      loading.remove();
      await addBotMsg(data.response); // auto-reproduce voz
    } catch(e) {
      loading.remove();
      addMsg('Uy, algo falló. Intentá de nuevo.', 'bot');
    }
    send.disabled = false;
  }

  function addMsg(text, cls) {
    const chat = document.getElementById('chat');
    const div  = document.createElement('div');
    div.className = 'msg ' + cls;
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  async function addBotMsg(text) {
    const chat  = document.getElementById('chat');
    const msgId = 'msg_' + Date.now();
    const div   = document.createElement('div');
    div.className = 'msg bot';
    div.innerHTML = `
      <div>${text}</div>
      <div class="msg-footer">
        <span class="speaking-dot" id="dot_${msgId}"></span>
        <button class="replay-btn" onclick="playVoice(${JSON.stringify(text)}, this)">🔊 Escuchar</button>
      </div>`;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;

    // Reproducir automáticamente
    await playVoice(text, null, `dot_${msgId}`);
  }

  async function playVoice(text, btn, dotId) {
    // Detener audio anterior
    if (currentAudio) { currentAudio.pause(); currentAudio = null; }

    const dot = dotId ? document.getElementById(dotId) : null;
    if (dot) dot.classList.add('active');
    if (btn) { btn.disabled = true; btn.textContent = '⏳...'; }

    try {
      const res = await fetch('/speak', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text })
      });
      if (!res.ok) throw new Error();

      const blob = await res.blob();
      const url  = URL.createObjectURL(blob);
      currentAudio = new Audio(url);
      currentAudio.play();
      currentAudio.onended = () => {
        if (dot) dot.classList.remove('active');
        currentAudio = null;
      };
    } catch(e) {
      console.error('Error voz:', e);
      if (dot) dot.classList.remove('active');
    }

    if (btn) { btn.disabled = false; btn.textContent = '🔊 Escuchar'; }
  }
</script>
</body>
</html>
